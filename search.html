<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search • Movie Finder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="index.html">Movie Finder</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <div class="navbar-nav ms-auto">
        <a class="nav-link active" href="search.html">Search</a>
        <a class="nav-link" href="favorites.html">Favorites</a>
      </div>
    </div>
  </div>
</nav>

<main class="container my-5">
  <h1 class="h3 mb-3">Search movies</h1>

  <form id="searchForm" class="row g-2 align-items-center">
    <div class="col-12 col-md-9">
      <input id="query" type="text" class="form-control" placeholder="Type a movie title (e.g., Batman)" required>
    </div>
    <div class="col-12 col-md-3 d-grid">
      <button class="btn btn-primary" type="submit">Search</button>
    </div>
  </form>

  <p id="status" class="text-muted mt-3 mb-0"></p>

  <div id="results" class="row g-3 mt-2">
    <!-- tänne tulee myöhemmin kortit -->
  </div>
</main>

<footer class="py-4 border-top">
  <div class="container text-center text-muted small">Movie Finder</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/search.js" defer></script>
</body>
</html>
