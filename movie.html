<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie • Movie Finder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="index.html">Movie Finder</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="search.html">Search</a>
        <a class="nav-link" href="favorites.html">Favorites</a>
      </div>
    </div>
  </div>
</nav>

<main class="container my-5">
  <a id="backLink" class="text-decoration-none" href="search.html">← Back to search</a>

  <div class="row g-4 mt-2 align-items-start">
    <div class="col-12 col-md-4">
      <img id="poster" class="img-fluid rounded shadow-sm" alt="Poster">
    </div>
    <div class="col-12 col-md-8">
      <h1 id="title" class="h3 mb-1">Movie title</h1>
      <p id="meta" class="text-muted mb-3"></p>

      <p id="plot" class="mb-4"></p>

      <div class="d-flex gap-2 flex-wrap">
        <button id="favBtn" class="btn btn-outline-primary">Add to favorites</button>
        <a id="imdbLink" class="btn btn-outline-secondary" target="_blank" rel="noreferrer">Open on IMDb</a>
      </div>
    </div>
  </div>
</main>

<footer class="py-4 border-top">
  <div class="container text-center text-muted small">Movie Finder</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/movie.js"></script>
</body>
</html>
